<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physarum Decay Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --panel-bg: rgba(15, 15, 15, 0.88);
      --text: #ffffff;
      --accent: #48b493;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: var(--bg);
      font-family: 'Bai Jamjuree', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }
    /* Hidden element to force the browser to download the font immediately */
    #font-preload {
      position: absolute;
      opacity: 0;
      font-family: 'Bai Jamjuree';
      font-weight: 700;
    }
    canvas { display: block; }

    #ui-panel {
      position: absolute;
      top: 20px; left: 20px;
      width: 300px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 10;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    p.subtitle { font-size: 0.75rem; color: #888; margin-bottom: 16px; }

    .tab-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab-btn {
      flex: 1; padding: 6px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; color: #aaa;
      font-size: 0.75rem; font-family: inherit;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .tab-btn.active { background: rgba(72, 180, 147, 0.12); border-color: var(--accent); color: var(--accent); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .control-group { margin-bottom: 13px; }
    label {
      display: flex; justify-content: space-between;
      font-size: 0.82rem; margin-bottom: 4px; color: #ccc;
    }
    label.block-label { display: block; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: white; padding: 9px; border-radius: 6px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    span.val { font-family: monospace; color: var(--accent); }

    hr.div { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 14px 0; }

    /* Drop zone */
    #drop-zone {
      width: 100%; min-height: 90px;
      border: 1.5px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      padding: 12px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(255,255,255,0.02); text-align: center;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: rgba(72, 180, 147, 0.04); }
    #drop-zone svg { opacity: 0.45; }
    #drop-zone p { font-size: 0.75rem; color: #777; line-height: 1.45; }
    #drop-zone strong { color: #aaa; font-weight: 500; }
    #file-input { display: none; }

    #img-preview-wrap { display: none; position: relative; margin-top: 12px; }
    #img-preview { width: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); display: block; background: #fff;}
    #img-clear {
      position: absolute; top: 5px; right: 5px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 0.7rem; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
    #img-clear:hover { background: #c00; }
    #img-status { font-size: 0.72rem; margin-top: 5px; color: var(--accent); min-height: 14px; }

    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;}
    .radio-group label {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.76rem; color: #bbb; cursor: pointer; margin-bottom: 0;
    }
    input[type="radio"] { accent-color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

<div id="font-preload">Load</div>

<div id="ui-panel">
  <h1>Physarum Model</h1>
  <p class="subtitle">Interactive Slime Mold Simulation</p>

  <div class="tab-row">
    <button class="tab-btn active" data-tab="text-tab">Text</button>
    <button class="tab-btn" data-tab="image-tab">Image</button>
  </div>

  <div class="tab-pane active" id="text-tab">
    <div class="control-group">
      <label class="block-label" for="textInput">Seed Text</label>
      <input type="text" id="textInput" value="BIODESIGN">
    </div>
  </div>

  <div class="tab-pane" id="image-tab">
    <div class="control-group">
      <label class="block-label">Upload Image</label>
      <div id="drop-zone">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p><strong>Click to browse</strong> or drag &amp; drop<br>Image File</p>
        <input type="file" id="file-input" accept="image/*">
      </div>
      <div id="img-preview-wrap">
        <img id="img-preview" alt="preview">
        <div id="img-clear" title="Remove">✕</div>
      </div>
      <div id="img-status"></div>
    </div>
  </div>

  <div class="control-group">
    <label class="block-label">Spawn agents on</label>
    <div class="radio-group">
      <label><input type="radio" name="edge-mode" value="edge"> Edges only</label>
      <label><input type="radio" name="edge-mode" value="fill" checked> Filled</label>
    </div>
  </div>

  <hr class="div">

  <div class="control-group">
    <label>Decay<span class="val" id="decayVal">0.96</span></label>
    <input type="range" id="decaySlider" min="0.80" max="0.99" step="0.01" value="0.96">
  </div>
  <div class="control-group">
    <label>Diffusion<span class="val" id="diffVal">0.25</span></label>
    <input type="range" id="diffSlider" min="0" max="1" step="0.05" value="0.25">
  </div>
  <div class="control-group">
    <label>Sensor Angle<span class="val" id="saVal">45°</span></label>
    <input type="range" id="saSlider" min="10" max="90" step="1" value="45">
  </div>
  <div class="control-group">
    <label>Rotation Angle<span class="val" id="raVal">30°</span></label>
    <input type="range" id="raSlider" min="5" max="90" step="1" value="30">
  </div>
  <div class="control-group">
    <label>Step Size<span class="val" id="stepVal">1.5</span></label>
    <input type="range" id="stepSlider" min="0.1" max="5.0" step="0.1" value="1.5">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ── Params & Globals ──────────────────────────────────────────────────────────
const AGENTS_PER_LETTER = 2000;
const SENSOR_DIST       = 10;
const TRAIL_R = 72, TRAIL_G = 180, TRAIL_B = 147;  // #48b493 decomposed

let textSeed        = "BIODESIGN";
let decayFactor     = 0.96;
let diffusionFactor = 0.25;
let sensorAngle     = Math.PI / 4;
let rotationAngle   = Math.PI / 6;
let stepSize        = 1.5;

let seedMode      = "text";   
let uploadedImage = null;     
let edgeMode      = "fill";   

let trailMap;       
let letterBuf;      
let allAgents = [];
let skeletonPixels = []; 
let trailR, trailG, trailB; 

// ── UI Setup & Event Listeners ────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  // Tab switching
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      
      const tabPane = document.getElementById(btn.dataset.tab);
      if (tabPane) tabPane.classList.add("active");
      
      seedMode = btn.dataset.tab === "image-tab" ? "image" : "text";
      if (typeof spawnAgents === "function") spawnAgents();
    });
  });

  document.querySelectorAll('input[name="edge-mode"]').forEach(r => {
    r.addEventListener("change", e => {
      edgeMode = e.target.value;
      if (typeof spawnAgents === "function") spawnAgents();
    });
  });

  const textInput = document.getElementById("textInput");
  if (textInput) {
    textInput.addEventListener("input", e => {
      textSeed = e.target.value;
      if (seedMode === "text" && typeof spawnAgents === "function") spawnAgents();
    });
  }

  function bindSlider(id, valId, setter, suffix = "") {
    const s = document.getElementById(id), v = document.getElementById(valId);
    if (s && v) {
      s.addEventListener("input", e => { v.innerText = e.target.value + suffix; setter(+e.target.value); });
    }
  }
  bindSlider("decaySlider", "decayVal",  x => decayFactor      = x);
  bindSlider("diffSlider",  "diffVal",   x => diffusionFactor = x);
  bindSlider("stepSlider",  "stepVal",   x => stepSize        = x);
  bindSlider("saSlider",    "saVal",     x => sensorAngle     = x * Math.PI / 180, "°");
  bindSlider("raSlider",    "raVal",     x => rotationAngle   = x * Math.PI / 180, "°");

  // Image Upload Logic (Drag-and-Drop / Click-to-browse)
  const imgClear    = document.getElementById("img-clear");
  const dropZone    = document.getElementById("drop-zone");
  const fileInput   = document.getElementById("file-input");

  if (imgClear) {
    imgClear.addEventListener("click", e => {
      e.stopPropagation();
      uploadedImage = null;
      
      const previewWrap = document.getElementById("img-preview-wrap");
      const previewImg  = document.getElementById("img-preview");
      if (previewWrap) previewWrap.style.display = "none";
      if (previewImg) previewImg.src = "";
      
      setStatus("");
      if (fileInput) fileInput.value = "";
      if (seedMode === "image" && typeof spawnAgents === "function") spawnAgents();
    });
  }

  if (dropZone && fileInput) {
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, e => {
        e.preventDefault(); e.stopPropagation();
      });
    });
    
    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", () => dropZone.classList.add("drag-over"));
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    
    dropZone.addEventListener("drop", e => {
      dropZone.classList.remove("drag-over");
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files); 
      }
    });
    
    fileInput.addEventListener("change", e => { 
      if (e.target.files && e.target.files.length > 0) {
        handleFile(e.target.files); 
      }
    });
  }
});

// ── Global Helper Functions ───────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  // Guard clause just in case a FileList sneaks through
  if (file instanceof FileList || (file.length !== undefined && !file.type)) {
    file = file;
  }
  if (!file || !(file instanceof Blob)) return;

  setStatus("Loading image...");
  
  const img = new Image();
  // Safe internal URL mapping to bypass local file blockers
  img.src = URL.createObjectURL(file);
  
  img.onload = () => {
    const previewWrap = document.getElementById("img-preview-wrap");
    const previewImg  = document.getElementById("img-preview");
    if (previewImg) previewImg.src = img.src;
    if (previewWrap) previewWrap.style.display = "block";
    
    uploadedImage = img;
    setStatus(`${img.naturalWidth}×${img.naturalHeight}px — loaded successfully`);
    
    seedMode = "image";
    document.querySelectorAll(".tab-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.tab === "image-tab"));
    document.querySelectorAll(".tab-pane").forEach(p =>
      p.classList.toggle("active", p.id === "image-tab"));

    // Micro-delay prevents math locking the UI thread while image loads
    setTimeout(() => { if (typeof spawnAgents === "function") spawnAgents(); }, 50);
  };
  
  img.onerror = () => {
    setStatus("Could not load image. It may be corrupted.", true);
  };
}

function setStatus(msg, err = false) {
  const imgStatus = document.getElementById("img-status");
  if (imgStatus) {
    imgStatus.style.color = err ? "#f66" : "var(--accent)";
    imgStatus.textContent = msg;
  }
}

// ── p5 sketch ─────────────────────────────────────────────────────────────────
function setup() {
  let w = max(1, windowWidth);
  let h = max(1, windowHeight);
  createCanvas(w, h);
  pixelDensity(1);
  initTrailBuffer();
  letterBuf = createGraphics(width, height);
  
  // Use the native Browser Font Loading API to wait for the font to be ready
  if (document.fonts) {
    document.fonts.load('120px "Bai Jamjuree"').then(() => {
      spawnAgents();
    }).catch(() => {
      // Fallback if font loading fails
      spawnAgents();
    });
  } else {
    // Fallback for older browsers
    setTimeout(spawnAgents, 500);
  }
}

function initTrailBuffer() {
  const n = width * height;
  trailR = new Float32Array(n);
  trailG = new Float32Array(n);
  trailB = new Float32Array(n);
}

function depositTrail(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  if (xi < 0 || xi >= width || yi < 0 || yi >= height) return;
  const idx = xi + yi * width;
  trailR[idx] = Math.min(255, trailR[idx] + TRAIL_R);
  trailG[idx] = Math.min(255, trailG[idx] + TRAIL_G);
  trailB[idx] = Math.min(255, trailB[idx] + TRAIL_B);
}

function senseTrail(sx, sy) {
  const xi = Math.floor(sx), yi = Math.floor(sy);
  if (xi < 0 || xi >= width || yi < 0 || yi >= height) return 0;
  return trailR[xi + yi * width]; 
}

function updateTrailBuffer() {
  const w = width, h = height;
  const newR = new Float32Array(w * h);
  const newG = new Float32Array(w * h);
  const newB = new Float32Array(w * h);

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      let sumR = 0, sumG = 0, sumB = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const i = (x + dx) + (y + dy) * w;
          sumR += trailR[i]; sumG += trailG[i]; sumB += trailB[i];
        }
      }
      const idx = x + y * w;
      const blurR = sumR / 9, blurG = sumG / 9, blurB = sumB / 9;
      newR[idx] = (blurR * diffusionFactor + trailR[idx] * (1 - diffusionFactor)) * decayFactor;
      newG[idx] = (blurG * diffusionFactor + trailG[idx] * (1 - diffusionFactor)) * decayFactor;
      newB[idx] = (blurB * diffusionFactor + trailB[idx] * (1 - diffusionFactor)) * decayFactor;
    }
  }
  trailR = newR; trailG = newG; trailB = newB;
}

function renderTrailToCanvas() {
  loadPixels();
  const n = width * height;
  
  // Clear the base layer
  for (let i = 0; i < n; i++) {
    const pi = i * 4;
    pixels[pi]     = 0;
    pixels[pi + 1] = 0;
    pixels[pi + 2] = 0;
    pixels[pi + 3] = 204; // 80% Opacity Trails
  }

  // Draw the permanent skeleton pixels FIRST (underneath)
  // Dimmed to 40% intensity so the bright trails vividly pop when overlapping
  for (let i = 0; i < skeletonPixels.length; i++) {
    const p = skeletonPixels[i];
    const pi = (p.x + p.y * width) * 4;
    pixels[pi]     = TRAIL_R * 0.2;
    pixels[pi + 1] = TRAIL_G * 0.2;
    pixels[pi + 2] = TRAIL_B * 0.2;
    pixels[pi + 3] = 255; 
  }

// Render the glowing trails ON TOP of the skeleton
const intensity = 0.6;
for (let i = 0; i < n; i++) {
  const pi = i * 4;
  if (trailR[i] > 30 || trailG[i] > 30 || trailB[i] > 30) {
    pixels[pi]     = Math.max(pixels[pi], trailR[i] * intensity);
    pixels[pi + 1] = Math.max(pixels[pi + 1], trailG[i] * intensity);
    pixels[pi + 2] = Math.max(pixels[pi + 2], trailB[i] * intensity);
  }
}

  updatePixels();
}

function draw() {
  for (const a of allAgents) a.update();
  for (const a of allAgents) depositTrail(a.pos.x, a.pos.y);
  updateTrailBuffer();
  renderTrailToCanvas();
}

function windowResized() {
  let w = max(1, windowWidth);
  let h = max(1, windowHeight);
  resizeCanvas(w, h);
  initTrailBuffer();
  if (letterBuf) letterBuf.remove();
  letterBuf = createGraphics(width, height);
  spawnAgents();
}

// ── Spawn ─────────────────────────────────────────────────────────────────────
function spawnAgents() {
  allAgents = [];
  skeletonPixels = []; // Clear skeleton mapping on respawn
  initTrailBuffer(); 

  if (seedMode === "image") spawnFromImage();
  else                      spawnFromText();
}

// ── Text spawn ────────────────────────────────────────────────────────────────
function spawnFromText() {
  if (!textSeed.trim()) return;
  if (!letterBuf || letterBuf.width <= 0 || letterBuf.height <= 0) return;

  const FONT_SIZE = 120;

  letterBuf.clear();
  letterBuf.background(0, 0);           
  letterBuf.textAlign(CENTER, CENTER);
  letterBuf.textFont("'Bai Jamjuree'"); // Use standard font-family reference
  letterBuf.textStyle(BOLD);            // Use bold weight
  letterBuf.textSize(FONT_SIZE);
  letterBuf.fill(255);
  letterBuf.noStroke();
  letterBuf.text(textSeed, letterBuf.width / 2, letterBuf.height / 2);
  letterBuf.loadPixels();

  const W = letterBuf.width, H = letterBuf.height;
  const cx = Math.floor(W / 2), cy = Math.floor(H / 2);
  const halfW = Math.min(cx, Math.floor(textSeed.length * FONT_SIZE * 0.65));
  const halfH = Math.floor(FONT_SIZE * 0.7);
  const x0 = max(1, cx - halfW - 30), x1 = min(W - 2, cx + halfW + 30);
  const y0 = max(1, cy - halfH - 20), y1 = min(H - 2, cy + halfH + 20);

  for (let py = y0; py < y1; py++) {
    for (let px = x0; px < x1; px++) {
      const idx = 4 * (px + py * W);
      if (letterBuf.pixels[idx + 3] < 128) continue; 
      
      if (edgeMode === "edge") {
        let isEdge = false;
        outer: for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (!dx && !dy) continue;
            if (letterBuf.pixels[4 * ((px+dx) + (py+dy) * W) + 3] < 128) {
              isEdge = true; break outer;
            }
          }
        }
        if (isEdge) skeletonPixels.push({ x: px, y: py });
      } else {
        skeletonPixels.push({ x: px, y: py });
      }
    }
  }

  if (!skeletonPixels.length) return;

  const total = AGENTS_PER_LETTER * max(1, textSeed.trim().length);
  for (let i = 0; i < total; i++) {
    const bp = skeletonPixels[Math.floor(Math.random() * skeletonPixels.length)];
    allAgents.push(new Agent(bp.x + random(-1,1), bp.y + random(-1,1), random(TWO_PI)));
  }
}

// ── Image spawn ───────────────────────────────────────────────────────────────
function spawnFromImage() {
  if (!uploadedImage) return;

  const offC = document.createElement("canvas");
  offC.width = width; offC.height = height;
  const ctx = offC.getContext("2d");
  ctx.clearRect(0, 0, width, height);

  // For images like the BioDesign slide, fit to canvas size
  const scale = Math.min(width / uploadedImage.naturalWidth, height / uploadedImage.naturalHeight);
  if (!scale || scale === Infinity) return;

  const dw = uploadedImage.naturalWidth * scale;
  const dh = uploadedImage.naturalHeight * scale;
  ctx.drawImage(uploadedImage, (width - dw) / 2, (height - dh) / 2, dw, dh);

  let data;
  try {
    data = ctx.getImageData(0, 0, width, height).data;
  } catch(e) {
    setStatus("Canvas tainted. Try another image format.", true);
    return;
  }

  // UPDATED LOGIC: Allows scanning images with WHITE backgrounds
  const isInside = i => {
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    // Check if the pixel has color/opacity AND is NOT completely bright white
    return a > 50 && (r + g + b) < 720; 
  };

  if (edgeMode === "edge") {
    for (let py = 1; py < height - 1; py++) {
      for (let px = 1; px < width - 1; px++) {
        if (!isInside(4*(px + py*width))) continue;
        let edge = false;
        outer: for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
          if (!dx && !dy) continue;
          if (!isInside(4*((px+dx)+(py+dy)*width))) { edge=true; break outer; }
        }
        if (edge) skeletonPixels.push({x:px, y:py});
      }
    }
  } else {
    for (let py = 0; py < height; py++)
      for (let px = 0; px < width; px++)
        if (isInside(4*(px+py*width))) skeletonPixels.push({x:px, y:py});
  }

  if (!skeletonPixels.length) { 
    setStatus("No non-white pixels found. Image might be blank.", true); 
    return; 
  }

  const total = Math.min(skeletonPixels.length, AGENTS_PER_LETTER * 8);
  for (let i = 0; i < total; i++) {
    const bp = skeletonPixels[Math.floor(Math.random() * skeletonPixels.length)];
    allAgents.push(new Agent(bp.x + random(-1,1), bp.y + random(-1,1), random(TWO_PI)));
  }
  setStatus(`${allAgents.length.toLocaleString()} agents spawned from image`);
}

// ── Agent ─────────────────────────────────────────────────────────────────────
class Agent {
  constructor(x, y, angle) {
    this.pos   = createVector(x, y);
    this.angle = angle;
  }
  update() {
    const sL = this._sense(this.angle - sensorAngle);
    const sC = this._sense(this.angle);
    const sR = this._sense(this.angle + sensorAngle);

    if      (sL > sC && sL > sR) this.angle -= rotationAngle;
    else if (sR > sC && sR > sL) this.angle += rotationAngle;
    else                         this.angle += random(-0.1, 0.1);

    this.pos.x = (this.pos.x + cos(this.angle) * stepSize + width)  % width;
    this.pos.y = (this.pos.y + sin(this.angle) * stepSize + height) % height;
  }
  _sense(angle) {
    return senseTrail(
      this.pos.x + Math.cos(angle) * SENSOR_DIST,
      this.pos.y + Math.sin(angle) * SENSOR_DIST
    );
  }
}
</script>
